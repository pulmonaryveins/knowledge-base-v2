<!-- FILE: src/app/shared/components/sidebar/sidebar.component.html -->
<aside class="sidebar">
  <!-- Brand -->
  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <img class="sidebar__logo-img" src="logo.png" alt="NCompassTV logo" />
    </div>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-name">NCompassTV</span>
      <span class="sidebar__brand-sub">DEV PORTAL</span>
    </div>
  </div>

  <!-- Search Button -->
  <div class="sidebar__search-wrap">
    <button class="sidebar__search-btn" (click)="openSearch()">
      <span class="sidebar__search-icon">🔍</span>
      <span class="sidebar__search-placeholder">Search the portal…</span>
      <kbd class="sidebar__search-kbd">⌘K</kbd>
    </button>
  </div>

  <!-- Teams -->
  <div class="sidebar__section">
    <span class="sidebar__section-label">TEAMS</span>

    @for (team of teams(); track team.key) {
      <div class="sidebar__team-group">
        <button
          class="sidebar__team-btn"
          [class.sidebar__team-btn--active]="team.key === activeKey()"
          (click)="switchTeam(team.key)"
        >
          <span class="sidebar__team-dot" [style.background]="team.color"></span>
          <span class="sidebar__team-name">{{ team.label }}</span>
          @if (team.key === activeKey()) {
            <span class="sidebar__team-chevron">▾</span>
          }
        </button>

        <!-- Project sub-links (only for active team) -->
        @if (team.key === activeKey() && team.projects.length > 0) {
          <ul class="sidebar__projects">
            @for (project of team.projects; track project.id) {
              <li class="sidebar__project">
                <button
                  class="sidebar__project-btn"
                  [class.sidebar__project-btn--active]="project.id === activeProjectId()"
                  (click)="toggleProject(project.id)"
                >
                  <span class="sidebar__project-icon">{{ project.icon }}</span>
                  <span class="sidebar__project-name">{{ project.name }}</span>
                  <app-status-badge [status]="project.status" />
                </button>
              </li>
            }
          </ul>
        }
      </div>
    }
  </div>

  <!-- Footer -->
  <div class="sidebar__footer">
    <span class="sidebar__footer-text">NCompassTV · Dev Portal · 2025</span>
  </div>
</aside>
